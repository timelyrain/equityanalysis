<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockIQ — Institutional Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #05060f;
      --bg-card:   #0b0d1a;
      --bg-hover:  #111428;
      --border:    rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --teal:      #00e5c3;
      --teal-dim:  rgba(0,229,195,0.12);
      --teal-glow: rgba(0,229,195,0.25);
      --amber:     #f5a623;
      --amber-dim: rgba(245,166,35,0.12);
      --red:       #ff4757;
      --red-dim:   rgba(255,71,87,0.12);
      --green:     #2ed573;
      --green-dim: rgba(46,213,115,0.12);
      --yellow:    #ffd32a;
      --text-1:    #e8eaf6;
      --text-2:    #8892b0;
      --text-3:    #4a5578;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,229,195,0.04) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    }

    /* ─── NAV ─────────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5,6,15,0.85);
    }
    .logo {
      font-family: var(--sans);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--teal); }
    .nav-tag {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-3);
      text-transform: uppercase;
    }

    /* ─── SEARCH BAR ──────────────────────────────────── */
    .search-section {
      max-width: 960px;
      margin: 60px auto 0;
      padding: 0 24px;
      text-align: center;
    }
    .search-headline {
      font-family: var(--sans);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .search-headline em {
      font-style: normal;
      color: var(--teal);
    }
    .search-sub {
      font-size: 0.75rem;
      color: var(--text-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .search-row {
      display: flex;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }
    .ticker-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-1);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .ticker-input::placeholder { color: var(--text-3); letter-spacing: 0.08em; text-transform: none; }
    .ticker-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-dim);
    }
    .analyze-btn {
      background: var(--teal);
      color: #05060f;
      border: none;
      border-radius: 6px;
      padding: 14px 28px;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .analyze-btn:hover { background: #00f0cc; box-shadow: 0 0 24px var(--teal-glow); }
    .analyze-btn:active { transform: scale(0.98); }
    .analyze-btn:disabled { background: var(--text-3); cursor: not-allowed; box-shadow: none; }

    /* ─── STATUS / ERROR ──────────────────────────────── */
    .status-bar {
      max-width: 960px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: none;
    }
    .status-bar.visible { display: block; }
    .status-msg {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      font-size: 0.8rem;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-msg.error { border-color: var(--red); color: var(--red); background: var(--red-dim); }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── DASHBOARD ───────────────────────────────────── */
    #dashboard {
      max-width: 1200px;
      margin: 40px auto 80px;
      padding: 0 24px;
      display: none;
    }
    #dashboard.visible { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── COMPANY HEADER ──────────────────────────────── */
    .company-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .company-left {}
    .company-ticker {
      font-family: var(--sans);
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--teal);
      line-height: 1;
    }
    .company-name {
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
      margin-top: 4px;
    }
    .company-meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .meta-pill {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-2);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 3px;
    }
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .verdict-STRONG-BUY  { background: rgba(46,213,115,0.15); border: 1px solid var(--green); color: var(--green); }
    .verdict-BUY         { background: rgba(0,229,195,0.12);  border: 1px solid var(--teal);  color: var(--teal); }
    .verdict-HOLD        { background: rgba(255,211,42,0.12); border: 1px solid var(--yellow); color: var(--yellow); }
    .verdict-UNDERPERFORM{ background: rgba(245,166,35,0.12); border: 1px solid var(--amber);  color: var(--amber); }
    .verdict-AVOID       { background: rgba(255,71,87,0.12);  border: 1px solid var(--red);   color: var(--red); }
    .analyst-view {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 2px solid var(--teal);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.74rem;
      color: var(--text-2);
      line-height: 1.7;
    }
    .target-price-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }
    .target-price-val {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-1);
    }
    .target-price-lbl {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .upside-tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .upside-tag.up   { background: rgba(46,213,115,0.12); color: var(--green); }
    .upside-tag.down { background: rgba(255,71,87,0.12);  color: var(--red); }

    /* ─── SHORT INTEREST ─────────────────────────────── */
    .short-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .short-item { display: flex; flex-direction: column; gap: 3px; }
    .short-lbl { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
    .short-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 600; color: var(--text-1); }
    .short-signal {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      letter-spacing: 0.06em;
    }
    .sig-LOW            { background: rgba(46,213,115,0.12);  color: var(--green);  border: 1px solid var(--green); }
    .sig-NORMAL         { background: rgba(0,229,195,0.08);   color: var(--teal);   border: 1px solid var(--teal); }
    .sig-ELEVATED       { background: rgba(255,211,42,0.12);  color: var(--yellow); border: 1px solid var(--yellow); }
    .sig-HIGH           { background: rgba(245,166,35,0.12);  color: var(--amber);  border: 1px solid var(--amber); }
    .sig-EXTREME        { background: rgba(255,71,87,0.12);   color: var(--red);    border: 1px solid var(--red); }
    .sig-SQUEEZE        { background: rgba(255,71,87,0.18);   color: var(--red);    border: 1px solid var(--red); }
    .sig-UNKNOWN        { background: transparent; color: var(--text-3); border: 1px solid var(--border); }
    .short-signal-wrap  { position: relative; display: inline-block; cursor: default; }
    .short-tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 200;
      background: #13152a;
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .short-signal-wrap:hover .short-tooltip { display: block; }
    .tooltip-title {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 16px;
    }
    .tooltip-row:last-child { border-bottom: none; }
    .tooltip-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
    }
    .tooltip-desc { font-size: 0.68rem; color: var(--text-2); text-align: right; }
    .tooltip-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* ─── RANKING BANNER ──────────────────────────────── */
    .ranking-banner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .rank-item { text-align: center; }
    .rank-val {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--teal);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .rank-lbl {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 6px;
    }
    .rank-divider { width: 1px; height: 40px; background: var(--border); }

    /* ─── SCORE GRID ──────────────────────────────────── */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    @media (max-width: 768px) { .scores-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .scores-grid { grid-template-columns: repeat(2, 1fr); } }

    .score-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .score-card:hover { border-color: var(--border-hi); }
    .score-card.overall {
      border-color: rgba(0,229,195,0.3);
      background: linear-gradient(135deg, var(--bg-card), rgba(0,229,195,0.04));
    }
    .ring-wrap { position: relative; width: 88px; height: 88px; }
    .score-ring { width: 88px; height: 88px; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border-hi); stroke-width: 5; }
    .ring-fill {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 226.2;
      stroke-dashoffset: 226.2;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 1.3rem;
      font-weight: 800;
    }
    .score-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .score-rank {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
    }

    /* ─── SECTION TITLE ───────────────────────────────── */
    .section-title {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-1);
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── FUNDAMENTALS GRID ───────────────────────────── */
    .fundamentals-section { margin-bottom: 36px; }
    .fund-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    @media (max-width: 768px) { .fund-grid { grid-template-columns: repeat(2, 1fr); } }
    .fund-group {
      background: var(--bg-card);
      padding: 16px 18px;
    }
    .fund-group-title {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 12px;
      opacity: 0.7;
    }
    .fund-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .fund-row:last-child { border-bottom: none; }
    .fund-key { font-size: 0.68rem; color: var(--text-2); cursor: default; }
    .fund-key[data-tip] { border-bottom: 1px dashed rgba(255,255,255,0.2); }
    #fund-tooltip {
      position: fixed;
      z-index: 9999;
      background: #1e2530;
      color: var(--text-1);
      font-size: 0.62rem;
      font-family: var(--mono);
      line-height: 1.5;
      padding: 8px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      width: 220px;
      white-space: normal;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      text-align: left;
      font-weight: 400;
      letter-spacing: 0;
    }
    #fund-tooltip.visible { opacity: 1; }
    .fund-val { font-size: 0.78rem; font-weight: 500; color: var(--text-1); }
    .fund-val.positive { color: var(--green); }
    .fund-val.negative { color: var(--red); }
    .fund-val.neutral  { color: var(--yellow); }
    .fund-val.na { color: var(--text-3); }

    /* ─── PEER COMPARISON TABLE ───────────────────────── */
    .peers-section { margin-bottom: 36px; }
    .table-wrap { overflow-x: hidden; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    thead tr { background: rgba(0,229,195,0.05); border-bottom: 1px solid var(--border); }
    th {
      padding: 10px 14px;
      text-align: right;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      white-space: nowrap;
    }
    th:first-child, th:nth-child(2) { text-align: left; }
    td {
      padding: 10px 14px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text-2);
      white-space: nowrap;
    }
    td:first-child, td:nth-child(2) { text-align: left; }
    tr:last-child td { border-bottom: none; }
    tr.target-row { background: rgba(0,229,195,0.04); }
    tr.target-row td { color: var(--text-1); }
    .ticker-cell { font-weight: 600; color: var(--teal); }
    .name-cell { color: var(--text-2); font-size: 0.68rem; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    tr.target-row .name-cell { color: var(--text-1); }
    .score-cell {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .cell-up   { color: var(--green); }
    .cell-down { color: var(--red); }
    .cell-flat { color: var(--yellow); }
    .star { color: var(--teal); margin-left: 4px; font-size: 0.65rem; }

    /* ─── CASES + SIGNALS ─────────────────────────────── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }
    @media (max-width: 900px) { .bottom-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .bottom-grid { grid-template-columns: 1fr; } }

    .case-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .case-card.bull { border-top: 2px solid var(--green); }
    .case-card.bear { border-top: 2px solid var(--red); }
    .case-card.risk { border-top: 2px solid var(--amber); }
    .case-tag {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .case-tag.bull { color: var(--green); }
    .case-tag.bear { color: var(--red); }
    .case-tag.risk { color: var(--amber); }
    .case-text { font-size: 0.72rem; color: var(--text-2); line-height: 1.7; }
    .case-point { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .case-point:last-child { border-bottom: none; }

    /* ─── STRENGTHS / WEAKNESSES ──────────────────────── */
    .sw-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }
    @media (max-width: 600px) { .sw-grid { grid-template-columns: 1fr; } }
    .sw-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .sw-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.72rem;
      color: var(--text-2);
      line-height: 1.5;
    }
    .sw-item:last-child { border-bottom: none; }
    .sw-dot { flex-shrink: 0; margin-top: 6px; width: 5px; height: 5px; border-radius: 50%; }
    .sw-dot.str { background: var(--green); }
    .sw-dot.wk  { background: var(--red); }

    /* ─── GATE SCREEN ─────────────────────────────────── */
    #gate {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #gate.hidden { display: none; }
    .gate-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 16px;
      text-align: center;
    }
    .gate-title { font-size: 1.4rem; font-weight: 700; color: var(--text-1); }
    .gate-sub { font-size: 0.72rem; color: var(--text-3); letter-spacing: 0.04em; }
    .gate-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-1);
      font-family: var(--mono); font-size: 0.9rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-align: center; outline: none; box-sizing: border-box;
    }
    .gate-input:focus { border-color: var(--teal); }
    .gate-btn {
      padding: 12px; border-radius: 8px;
      background: var(--teal); color: #000;
      font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      border: none; cursor: pointer;
    }
    .gate-btn:hover { opacity: 0.85; }
    .gate-error { font-size: 0.68rem; color: var(--red); min-height: 1em; }
  </style>
</head>
<body>

<!-- INVITE CODE GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-title">Stock<span style="color:var(--teal)">IQ</span></div>
    <div class="gate-sub">This tool is invite-only.<br>Enter your access code to continue.</div>
    <input id="gateInput" class="gate-input" type="text" placeholder="XXXX-XXXX" maxlength="20" autocomplete="off" spellcheck="false" />
    <button class="gate-btn" onclick="submitCode()">Unlock Access</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<nav>
  <div>
    <div class="logo">Stock<span>IQ</span></div>
    <div class="nav-tag">Institutional Analysis Engine</div>
  </div>
</nav>

<section class="search-section">
  <h1 class="search-headline">Institutional<br><em>Equity Analysis</em></h1>
  <p class="search-sub">Fundamental scoring · Peer ranking · Sector benchmarking</p>
  <div class="search-row">
    <input
      id="tickerInput"
      class="ticker-input"
      type="text"
      placeholder="Enter ticker or company name e.g. NVDA or NVIDIA"
      maxlength="60"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="analyzeBtn" class="analyze-btn" onclick="runAnalysis()">Analyze</button>
  </div>
</section>

<div class="status-bar" id="statusBar">
  <div class="status-msg" id="statusMsg">
    <div class="spinner" id="statusSpinner"></div>
    <span id="statusText">Searching live market data and running analysis…</span>
  </div>
</div>

<div id="dashboard">
  <!-- rendered dynamically -->
</div>


<script>
const API_URL = "/api/analyze";

function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

async function runAnalysis() {
  const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
  if (!ticker) return;

  const btn = document.getElementById("analyzeBtn");
  const statusBar = document.getElementById("statusBar");
  const statusMsg = document.getElementById("statusMsg");
  const statusText = document.getElementById("statusText");
  const spinner = document.getElementById("statusSpinner");
  const dashboard = document.getElementById("dashboard");

  btn.disabled = true;
  dashboard.classList.remove("visible");
  statusBar.classList.add("visible");
  statusMsg.className = "status-msg";
  spinner.style.display = "block";
  statusText.textContent = `Analysing ${ticker}…`;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Invite-Code": localStorage.getItem("inviteCode") || "" },
      body: JSON.stringify({ ticker }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "Analysis failed");

    renderDashboard(data);
    const deployFooter = document.getElementById("deploy-footer");
    if (deployFooter && buildTime) deployFooter.textContent = "Last deployment: " + buildTime;
    statusBar.classList.remove("visible");
    dashboard.classList.add("visible");
    dashboard.scrollIntoView({ behavior: "smooth", block: "start" });

  } catch (err) {
    statusMsg.className = "status-msg error";
    spinner.style.display = "none";
    statusText.textContent = `Error: ${err.message}`;
  }

  btn.disabled = false;
}

document.getElementById("tickerInput").addEventListener("keydown", e => {
  if (e.key === "Enter") runAnalysis();
});

// ── Render helpers ─────────────────────────────────────────

const TIER_COLORS = { A: "#2ed573", B: "#00e5c3", C: "#ffd32a", D: "#f5a623", E: "#ff4757", F: "#ff4757" };
function toTier(rank) {
  const t = ["A", "B", "C", "D", "E", "F"][rank - 1];
  if (!t) return "—";
  return `<span style="color:${TIER_COLORS[t]}">${t}</span>`;
}

function fmtNum(v, dec=1, suffix="") {
  if (v === null || v === undefined) return '<span class="fund-val na">—</span>';
  return `<span class="fund-val">${(+v).toFixed(dec)}${suffix}</span>`;
}

function fmtPct(v) {
  if (v === null || v === undefined) return '<span class="fund-val na">—</span>';
  const cls = +v > 0 ? "positive" : +v < 0 ? "negative" : "";
  return `<span class="fund-val ${cls}">${(+v).toFixed(1)}%</span>`;
}

function fmtGrowth(v) {
  if (v === null || v === undefined) return '<span class="fund-val na">—</span>';
  const cls = +v > 0 ? "positive" : +v < 0 ? "negative" : "neutral";
  const sign = +v > 0 ? "+" : "";
  return `<span class="fund-val ${cls}">${sign}${(+v).toFixed(1)}%</span>`;
}

function shortSignalClass(signal) {
  if (!signal) return "sig-UNKNOWN";
  if (signal.includes("SQUEEZE")) return "sig-SQUEEZE";
  return "sig-" + signal.split(" ")[0];
}

function shortInterpretation(signal, shortFloat, shortRatio, overallScore) {
  if (!signal || signal === "UNKNOWN") return "Data unavailable";
  if (overallScore == null) return "Sentiment context unavailable — scoring data incomplete.";
  const isHigh     = ["HIGH", "EXTREME", "SQUEEZE CANDIDATE"].includes(signal);
  const isElevated = signal === "ELEVATED";
  const isLow      = ["LOW", "NORMAL"].includes(signal);
  const strong     = overallScore >= 65;
  const weak       = overallScore < 45;
  const slowUnwind = shortRatio != null && shortRatio >= 7;

  if (signal === "SQUEEZE CANDIDATE")
    return "High short + slow unwind — any upward catalyst risks cascading short covering";
  if (isHigh && weak)
    return "Bearish confirmation — institutional shorts agree with weak fundamentals";
  if (isHigh && strong)
    return "Tension signal — shorts fighting strong fundamentals, contrarian squeeze potential";
  if (isHigh && slowUnwind)
    return "Slow unwind speed — even a small rally could trigger cascading short covering";
  if (isLow && strong)
    return "Clean bull setup — strong fundamentals with no short headwinds";
  if (isElevated && strong)
    return "Bears testing strong fundamentals — watch for squeeze if momentum builds";
  if (isElevated && weak)
    return "Bearish pressure building — shorts gaining conviction on weak fundamentals";
  const defaults = {
    "LOW":    "Few bears — market has broad confidence in the stock",
    "NORMAL": "Normal short activity — broadly neutral market sentiment",
    "ELEVATED":"Meaningful bearish positioning — some institutional skepticism",
    "HIGH":   "Significant institutional short thesis in play",
    "EXTREME":"Heavy shorting — high conviction bears dominating",
  };
  return defaults[signal] || "";
}

function scoreColor(s) {
  if (s >= 75) return "#2ed573";
  if (s >= 55) return "#00e5c3";
  if (s >= 40) return "#ffd32a";
  if (s >= 25) return "#f5a623";
  return "#ff4757";
}

function ringOffset(score) {
  const circ = 226.2;
  return circ * (1 - score / 100);
}

function cellClass(val, targetVal, lowerBetter=false) {
  if (val === null || targetVal === null) return "";
  const better = lowerBetter ? val < targetVal : val > targetVal;
  const worse  = lowerBetter ? val > targetVal : val < targetVal;
  const diff   = Math.abs((val - targetVal) / (Math.abs(targetVal) || 1));
  if (diff < 0.05) return "cell-flat";
  return better ? "cell-up" : "cell-down";
}

function tdVal(val, target, dec=1, suffix="", lowerBetter=false) {
  if (val === null || val === undefined) return '<td>—</td>';
  const cls = target !== null ? cellClass(val, target, lowerBetter) : "";
  return `<td class="${cls}">${(+val).toFixed(dec)}${suffix}</td>`;
}

// ── Main render ────────────────────────────────────────────

function renderDashboard(d) {
  const f = d.fundamentals || {};
  const s = d.scores || {};
  const r = d.rankings || {};
  const peers = d.competitors || [];
  const verdictKey = (d.analyst_verdict || "HOLD").replace(/ /g, "-");

  const missing = [];
  if (!d.scores)                                      missing.push("Scoring");
  if (!d.competitors || d.competitors.length === 0)   missing.push("Peer comparison");
  else if (d.peers_found != null && d.peers_found < 3) missing.push(`Peer comparison (only ${d.peers_found} peer${d.peers_found === 1 ? "" : "s"} retrieved — scores unreliable)`);
  if (!d.earnings_date)                      missing.push("Earnings date");
  if (!d.verdict_rationale)                  missing.push("Analyst narrative");
  if (!d.bull_case   || d.bull_case.length   === 0) missing.push("Bull case");
  if (!d.bear_case   || d.bear_case.length   === 0) missing.push("Bear case");
  if (!d.strengths   || d.strengths.length   === 0) missing.push("Strengths");
  if (!d.weaknesses  || d.weaknesses.length  === 0) missing.push("Weaknesses");

  const cacheLabel = `<span style="margin-left:auto;opacity:0.5;font-size:0.6rem;">${d.cache_hit ? "⚡ served from cache" : "↻ freshly fetched"}</span>`;
  const resolvedLabel = d.resolved_from ? `<span style="opacity:0.7;font-size:0.6rem;">&#128269; "${esc(d.resolved_from)}" resolved to ${esc(d.ticker)}</span>` : "";
  const dataBanner = missing.length === 0
    ? `<div style="background:rgba(0,229,195,0.06);border:1px solid rgba(0,229,195,0.25);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:0.68rem;color:var(--teal);display:flex;align-items:center;gap:8px;">
        <span>&#10003;</span> All data retrieved successfully. ${resolvedLabel} ${cacheLabel}
       </div>`
    : `<div style="background:rgba(255,180,0,0.08);border:1px solid rgba(255,180,0,0.3);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:0.68rem;color:var(--yellow);display:flex;align-items:center;gap:8px;">
        <span>&#9888;</span> Incomplete data &mdash; missing: ${missing.join(", ")}. ${resolvedLabel} ${cacheLabel}
       </div>`;

  const html = `
    ${dataBanner}
    <!-- COMPANY HEADER -->
    <div class="company-header">
      <div class="company-left">
        <div style="display:flex;align-items:baseline;gap:14px;">
          <div class="company-ticker">${esc(d.ticker)}</div>
          ${d.current_price ? `<div style="font-family:var(--mono);font-size:1.2rem;font-weight:500;color:var(--text-2);">$${(+d.current_price).toFixed(2)}</div>` : ""}
        </div>
        <div class="company-name">${esc(d.company_name)}</div>
        <div class="company-meta">
          <span class="meta-pill">${esc(d.sector)}</span>
          <span class="meta-pill">${esc(d.industry)}</span>
          ${f.market_cap_b ? `<span class="meta-pill">Mkt Cap $${(+f.market_cap_b).toFixed(1)}B</span>` : ""}
          ${d.earnings_date ? `<span class="meta-pill" style="color:var(--teal)">&#9656; Earnings ${esc(d.earnings_date)}</span>` : ""}
        </div>
      </div>
      <div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="verdict-badge verdict-${esc(verdictKey)}">
            <span>${esc(d.analyst_verdict) || "HOLD"}</span>
          </div>
          ${(() => {
            const tp = d.target_price, cp = d.current_price;
            if (!tp) return "";
            const upside = cp ? ((tp - cp) / cp * 100) : null;
            const upsideHtml = upside !== null
              ? `<span class="upside-tag ${upside >= 0 ? "up" : "down"}">${upside >= 0 ? "+" : ""}${upside.toFixed(1)}%</span>`
              : "";
            const spyHtml = d.vs_sp500 != null
              ? `<span class="upside-tag ${d.vs_sp500 >= 0 ? "up" : "down"}">${d.vs_sp500 >= 0 ? "+" : ""}${d.vs_sp500.toFixed(1)}% vs SPY</span>`
              : "";
            return `<div>
              <div class="target-price-block">
                <div>
                  <div class="target-price-lbl">Analyst Target</div>
                  <div class="target-price-val">$${(+tp).toFixed(2)}</div>
                </div>
                ${upsideHtml}
                ${spyHtml}
              </div>
            </div>`;
          })()}
        </div>
      </div>
    </div>

    <!-- ANALYST VIEW -->
    ${d.verdict_rationale ? `<div class="analyst-view">${esc(d.verdict_rationale)}</div>` : ""}

    <!-- SHORT INTEREST -->
    ${d.short_signal ? `
    <div class="section-title" style="margin-bottom:10px;">Market Sentiment</div>
    <div class="short-bar">
      <div class="short-item">
        <span class="short-lbl">Short Interest</span>
        <span class="short-signal-wrap">
          <span class="short-signal ${shortSignalClass(d.short_signal)}">${esc(d.short_signal)}</span>
          <div class="short-tooltip">
            <div class="tooltip-title">How to read short interest</div>
            <div class="tooltip-row"><span class="tooltip-badge sig-HIGH">High short + Weak fundamentals</span><span class="tooltip-desc">Bearish confirmation — smart money agrees</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-SQUEEZE">High short + Strong fundamentals</span><span class="tooltip-desc">Tension signal — potential squeeze, contrarian opportunity</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-LOW">Low short + Strong fundamentals</span><span class="tooltip-desc">Clean bull setup — no headwinds from shorts</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-ELEVATED">High days-to-cover</span><span class="tooltip-desc">Any upward move risks cascading short covering</span></div>
          </div>
        </span>
      </div>
      <div class="short-item">
        <span class="short-lbl">Short Float</span>
        <span class="short-signal-wrap" style="display:inline-block">
          <span class="short-val" style="cursor:default;border-bottom:1px dashed var(--text-3)">${d.short_float != null ? d.short_float.toFixed(2) + "%" : "—"}</span>
          <div class="short-tooltip">
            <div class="tooltip-title">Short Float thresholds</div>
            <div class="tooltip-row"><span class="tooltip-badge sig-LOW">&lt; 2%&nbsp;&nbsp;LOW</span><span class="tooltip-desc">Broad market confidence</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-NORMAL">2–5%&nbsp;&nbsp;NORMAL</span><span class="tooltip-desc">Neutral — typical range</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-ELEVATED">5–10%&nbsp;&nbsp;ELEVATED</span><span class="tooltip-desc">Institutional skepticism building</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-HIGH">10–20%&nbsp;&nbsp;HIGH</span><span class="tooltip-desc">Strong institutional short thesis</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-EXTREME">&gt; 20%&nbsp;&nbsp;EXTREME</span><span class="tooltip-desc">High conviction bears dominating</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-SQUEEZE">≥10% + &gt;7d&nbsp;&nbsp;SQUEEZE</span><span class="tooltip-desc">Squeeze candidate — high risk/reward</span></div>
          </div>
        </span>
      </div>
      <div class="short-item">
        <span class="short-lbl">Days to Cover</span>
        <span class="short-signal-wrap" style="display:inline-block">
          <span class="short-val" style="cursor:default;border-bottom:1px dashed var(--text-3)">${d.short_ratio != null ? d.short_ratio.toFixed(1) + "d" : "—"}</span>
          <div class="short-tooltip">
            <div class="tooltip-title">Days to Cover — Squeeze Risk</div>
            <div class="tooltip-row"><span class="tooltip-badge sig-LOW">&lt; 3d&nbsp;&nbsp;LOW</span><span class="tooltip-desc">Easy to unwind — low squeeze risk</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-ELEVATED">3–7d&nbsp;&nbsp;ELEVATED</span><span class="tooltip-desc">Squeeze potential building — watch closely</span></div>
            <div class="tooltip-row"><span class="tooltip-badge sig-HIGH">&gt; 7d&nbsp;&nbsp;HIGH</span><span class="tooltip-desc">Forced buying amplifies any upside move</span></div>
            <hr class="tooltip-divider"/>
            <div class="tooltip-title">What it measures</div>
            <div class="tooltip-row" style="display:block;padding:2px 0"><span class="tooltip-desc">Number of days to buy back all shorted shares at average daily volume. Higher = harder to exit, more explosive on a rally.</span></div>
          </div>
        </span>
      </div>
      <div class="short-item" style="flex:1">
        <span class="short-lbl">What it means</span>
        <span style="font-size:0.72rem;color:var(--text-2)">${shortInterpretation(d.short_signal, d.short_float, d.short_ratio, d.scores?.overall ?? null)}</span>
      </div>
    </div>` : ""}

    <!-- FUNDAMENTALS -->
    <div class="fundamentals-section">
      <div class="section-title">Fundamental Metrics</div>
      <!-- SCORE RINGS -->
      <div class="scores-grid" id="scoresGrid" style="margin-bottom:8px;">
        ${renderScoreCard("Valuation", s.valuation, r.valuation_rank, r.total_peers, false)}
        ${renderScoreCard("Profitability", s.profitability, r.profitability_rank, r.total_peers, false)}
        ${renderScoreCard("Growth", s.growth, r.growth_rank, r.total_peers, false)}
        ${renderScoreCard("Fin. Health", s.financial_health, r.health_rank, r.total_peers, false)}
        ${renderScoreCard("Overall", s.overall, r.overall_rank, r.total_peers, true)}
      </div>
      <div style="font-size:0.62rem;color:var(--text-3);letter-spacing:0.06em;margin-bottom:16px;text-align:right;">
        ${d.peers_found != null
          ? d.peers_found >= 3
            ? `Scored against ${d.peers_found} peer${d.peers_found === 1 ? "" : "s"}`
            : `&#9888; Only ${d.peers_found} peer${d.peers_found === 1 ? "" : "s"} retrieved — scores unreliable`
          : ""}
      </div>
      <div class="fund-grid">
        <div class="fund-group">
          <div class="fund-group-title">Valuation</div>
          <div class="fund-row"><span class="fund-key" data-tip="Price-to-Earnings: share price divided by earnings per share. Lower means cheaper relative to current profits.">P/E Ratio</span>${fmtNum(f.pe_ratio)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Forward Price-to-Earnings: P/E based on next 12 months earnings estimates. Reflects what the market expects future profitability to be.">Forward P/E</span>${fmtNum(f.forward_pe)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Enterprise Value divided by EBITDA. A valuation multiple that accounts for debt. Lower means cheaper; more comparable across companies with different capital structures.">EV/EBITDA</span>${fmtNum(f.ev_ebitda)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Price-to-Sales: market cap divided by annual revenue. Useful for companies without positive earnings. Lower means cheaper relative to revenue.">P/S Ratio</span>${fmtNum(f.ps_ratio)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Price-to-Book: market cap divided by net asset value. Lower means the stock trades closer to the value of its assets on the balance sheet.">P/B Ratio</span>${fmtNum(f.pb_ratio)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Annual dividends paid as a percentage of share price. Higher means more income returned to shareholders relative to the stock price.">Dividend Yield</span>${fmtNum(f.dividend_yield, 2, "%")}</div>
        </div>
        <div class="fund-group">
          <div class="fund-group-title">Profitability</div>
          <div class="fund-row"><span class="fund-key" data-tip="Gross Margin: revenue minus cost of goods sold, as a % of revenue. Measures production efficiency. Higher means more retained per dollar of sales before operating costs.">Gross Margin</span>${fmtPct(f.gross_margin)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Operating Margin: profit after all operating expenses as a % of revenue. Measures core business profitability before interest and taxes.">Operating Margin</span>${fmtPct(f.operating_margin)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Net Margin: bottom-line profit as a % of revenue after all expenses, interest, and taxes. Shows how much of each dollar of revenue becomes actual profit.">Net Margin</span>${fmtPct(f.net_margin)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Return on Invested Capital: how efficiently a company generates profit from all capital invested (debt + equity). Higher means better capital allocation. Above 15% is generally strong.">ROIC</span>${fmtPct(f.roic)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Return on Equity: net income as a percentage of shareholders' equity. Measures how effectively management generates profit from equity capital. Higher is better.">ROE</span>${fmtPct(f.roe)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Free Cash Flow Yield: free cash flow divided by market cap, expressed as a %. Higher means the company generates more real cash relative to its price — a sign of quality earnings.">FCF Yield</span>${fmtNum(f.fcf_yield, 2, "%")}</div>
        </div>
        <div class="fund-group">
          <div class="fund-group-title">Growth</div>
          <div class="fund-row"><span class="fund-key" data-tip="Revenue Growth Year-over-Year: percentage change in total revenue compared to the same period last year. Measures top-line business expansion.">Revenue Growth YoY</span>${fmtGrowth(f.revenue_growth_yoy)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Earnings Per Share Growth Year-over-Year: percentage change in EPS versus the prior year. Measures how fast bottom-line profitability is growing per share.">EPS Growth YoY</span>${fmtGrowth(f.eps_growth_yoy)}</div>
        </div>
        <div class="fund-group">
          <div class="fund-group-title">Financial Health</div>
          <div class="fund-row"><span class="fund-key" data-tip="Net Debt divided by EBITDA: measures how many years of operating earnings it would take to pay off net debt. Lower (or negative) means a healthier, less leveraged balance sheet.">Net Debt/EBITDA</span>${fmtNum(f.net_debt_ebitda)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Current Ratio: current assets divided by current liabilities. Above 1 means the company can cover its short-term obligations. Higher generally signals better short-term financial health.">Current Ratio</span>${fmtNum(f.current_ratio)}</div>
          <div class="fund-row"><span class="fund-key" data-tip="Interest Coverage: EBIT divided by interest expense. Measures how comfortably a company can service its debt. Higher is safer; below 1.5x signals potential distress.">Interest Coverage</span>${fmtNum(f.interest_coverage)}</div>
        </div>
      </div>
    </div>

    <!-- PEER TABLE -->
    <div class="peers-section">
      <div class="section-title">Peer Comparison</div>
      <!-- RANKING BANNER -->
      <div class="ranking-banner" style="margin-bottom:16px;">
        <div class="rank-item">
          <div class="rank-val">${r.sector_percentile ?? "—"}<span style="font-size:0.85rem;color:var(--text-2)">th</span></div>
          <span class="short-signal-wrap">
            <div class="rank-lbl" style="cursor:default;border-bottom:1px dashed var(--text-3);display:inline-block">Sector Percentile</div>
            <div class="short-tooltip">
              <div class="tooltip-title">How Sector Percentile is estimated</div>
              <div class="tooltip-row" style="display:block;padding:2px 0"><span class="tooltip-desc">Claude AI estimates where this stock ranks within its broader sector universe (0–100), drawing on its training data across thousands of companies in the same sector.</span></div>
              <hr class="tooltip-divider"/>
              <div class="tooltip-row" style="display:block;padding:2px 0"><span class="tooltip-desc">A score of 92 means the stock is estimated to outperform ~92% of its sector peers on fundamentals, growth, and quality metrics.</span></div>
              <hr class="tooltip-divider"/>
              <div class="tooltip-row" style="display:block;padding:2px 0"><span class="tooltip-desc" style="color:rgba(255,255,255,0.35)">Note: this is a knowledge-based estimate, not a live calculation across all sector stocks.</span></div>
            </div>
          </span>
        </div>
        <div class="rank-divider"></div>
        <div class="rank-item" style="flex:1">
          <div style="display:flex;gap:0;flex-wrap:wrap;align-items:flex-start">
            ${(() => {
              const targetScore = d.scores ? Math.round(d.scores.overall) : null;
              const allCards = [
                { ticker: d.ticker, score: targetScore, ret: d.perf_year, isTarget: true },
                ...(d.competitors || []).map(c => {
                  const ps = (d.peer_scores || {})[c.ticker];
                  return { ticker: c.ticker, score: ps ? Math.round(ps.overall) : null, ret: c.perf_year, isTarget: false };
                })
              ].sort((a, b) => (b.score ?? -1) - (a.score ?? -1));

              return allCards.map((c, i, arr) => {
                const retColor = c.ret == null ? "var(--text-3)" : c.ret >= 0 ? "var(--green)" : "var(--red)";
                const retStr = c.ret != null ? `${c.ret >= 0 ? "+" : ""}${c.ret.toFixed(1)}%` : "—";
                const scoreStr = c.score != null ? `${c.score}` : "—";
                const divider = i < arr.length - 1 ? `<div style="width:1px;background:rgba(255,255,255,0.07);margin:2px 12px;align-self:stretch"></div>` : "";
                const tickerEl = c.isTarget
                  ? `<span style="font-family:var(--mono);font-size:0.78rem;font-weight:700;color:var(--text-1);letter-spacing:0.06em;">${esc(c.ticker)} ★</span>`
                  : `<span onclick="document.getElementById('tickerInput').value='${esc(c.ticker)}';runAnalysis();" style="font-family:var(--mono);font-size:0.78rem;font-weight:700;color:var(--teal);letter-spacing:0.06em;cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(0,229,195,0.35)">${esc(c.ticker)}</span>`;
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:75px;padding:4px 0">
                  ${tickerEl}
                  <span style="font-family:var(--mono);font-size:0.75rem;white-space:nowrap"><span style="color:var(--text-2)">${scoreStr}</span><span style="color:var(--text-3)"> · </span><span style="color:${retColor}">${retStr}</span></span>
                  <span style="font-size:0.6rem;color:var(--text-3);letter-spacing:0.04em">Overall · 12M</span>
                </div>${divider}`;
              }).join("");
            })()}
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Company</th>
              <th>Mkt Cap</th>
              <th>P/E</th>
              <th>EV/EBITDA</th>
              <th>P/S</th>
              <th>Gross Mgn</th>
              <th>Op Mgn</th>
              <th>ROIC</th>
              <th>Rev Grw</th>
              <th>EPS Grw</th>
              <th>ND/EBITDA</th>
              <th>FCF Yld</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody>
            ${[...peers.map(p => ({ type: "peer", data: p, score: d.peer_scores?.[p.ticker]?.overall ?? -1 })),
                { type: "target", data: d, score: s.overall ?? -1 }]
              .sort((a, b) => b.score - a.score)
              .map(item => item.type === "target"
                ? renderTargetRow(item.data, s.overall)
                : renderPeerRow(item.data, f, d.peer_scores))
              .join("")}
          </tbody>
        </table>
      </div>
    </div>

    <!-- BULL / BEAR / RISK -->
    <div class="bottom-grid">
      <div class="case-card bull">
        <div class="case-tag bull">▲ Bull Case</div>
        <div class="case-text">
          ${(Array.isArray(d.bull_case) ? d.bull_case : [d.bull_case]).filter(Boolean).map(p => `<div class="case-point">· ${esc(p)}</div>`).join("")}
        </div>
      </div>
      <div class="case-card bear">
        <div class="case-tag bear">▼ Bear Case</div>
        <div class="case-text">
          ${(Array.isArray(d.bear_case) ? d.bear_case : [d.bear_case]).filter(Boolean).map(p => `<div class="case-point">· ${esc(p)}</div>`).join("")}
        </div>
      </div>
      <div class="case-card risk">
        <div class="case-tag risk">⚠ Key Risks</div>
        <div class="case-text">
          ${(d.key_risks || []).map(r => `<div class="case-point">· ${esc(r)}</div>`).join("")}
        </div>
      </div>
    </div>

    <!-- STRENGTHS / WEAKNESSES -->
    <div class="sw-grid">
      <div class="sw-card">
        <div class="section-title">Strengths</div>
        ${(d.strengths || []).map(s => `
          <div class="sw-item">
            <div class="sw-dot str"></div>
            <span>${esc(s)}</span>
          </div>`).join("")}
      </div>
      <div class="sw-card">
        <div class="section-title">Weaknesses</div>
        ${(d.weaknesses || []).map(w => `
          <div class="sw-item">
            <div class="sw-dot wk"></div>
            <span>${esc(w)}</span>
          </div>`).join("")}
      </div>
    </div>

    <div style="text-align:center;padding:24px 0 8px;font-size:0.62rem;color:var(--text-3);letter-spacing:0.08em;border-top:1px solid var(--border);margin-top:24px;" id="deploy-footer"></div>
  `;

  document.getElementById("dashboard").innerHTML = html;
  animateRings();
}

function renderScoreCard(label, score, rank, total, isOverall) {
  const s = score ?? 0;
  const color = scoreColor(s);
  return `
    <div class="score-card ${isOverall ? "overall" : ""}">
      <div class="ring-wrap">
        <svg class="score-ring" viewBox="0 0 88 88">
          <circle class="ring-bg" cx="44" cy="44" r="36"/>
          <circle class="ring-fill" cx="44" cy="44" r="36"
            data-score="${s}"
            style="stroke:${color}; stroke-dashoffset:226.2"/>
        </svg>
        <div class="ring-num" style="color:${color}">${s}</div>
      </div>
      <div class="score-label">${label}</div>
      <div class="score-rank">Tier ${toTier(rank)}</div>
    </div>`;
}

function renderTargetRow(d, overall) {
  const f = d.fundamentals || {};
  return `
    <tr class="target-row">
      <td class="ticker-cell">${esc(d.ticker)}<span class="star">★</span></td>
      <td class="name-cell">${esc(d.company_name)}</td>
      <td>${f.market_cap_b ? "$" + (+f.market_cap_b).toFixed(0) + "B" : "—"}</td>
      <td>${f.pe_ratio != null ? (+f.pe_ratio).toFixed(1) : "—"}</td>
      <td>${f.ev_ebitda != null ? (+f.ev_ebitda).toFixed(1) : "—"}</td>
      <td>${f.ps_ratio != null ? (+f.ps_ratio).toFixed(1) : "—"}</td>
      <td>${f.gross_margin != null ? (+f.gross_margin).toFixed(1) + "%" : "—"}</td>
      <td>${f.operating_margin != null ? (+f.operating_margin).toFixed(1) + "%" : "—"}</td>
      <td>${f.roic != null ? (+f.roic).toFixed(1) + "%" : "—"}</td>
      <td>${f.revenue_growth_yoy != null ? (f.revenue_growth_yoy > 0 ? "+" : "") + (+f.revenue_growth_yoy).toFixed(1) + "%" : "—"}</td>
      <td>${f.eps_growth_yoy != null ? (f.eps_growth_yoy > 0 ? "+" : "") + (+f.eps_growth_yoy).toFixed(1) + "%" : "—"}</td>
      <td>${f.net_debt_ebitda != null ? (+f.net_debt_ebitda).toFixed(1) + "x" : "—"}</td>
      <td>${f.fcf_yield != null ? (+f.fcf_yield).toFixed(1) + "%" : "—"}</td>
      <td class="score-cell" style="color:${scoreColor(overall ?? 0)}">${overall ?? "—"}</td>
    </tr>`;
}

function renderPeerRow(p, tf, peerScores) {
  const peerOverall = peerScores?.[p.ticker]?.overall ?? null;
  const colorCls = (val, tgt, lowerBetter=false) => {
    if (val == null || tgt == null) return "";
    const better = lowerBetter ? +val < +tgt : +val > +tgt;
    const diff = Math.abs((val - tgt) / (Math.abs(tgt) || 1));
    if (diff < 0.05) return "cell-flat";
    return better ? "cell-up" : "cell-down";
  };
  const cell = (val, tgt, dec, suffix, lower=false) => {
    if (val == null) return "<td>—</td>";
    return `<td class="${colorCls(val, tgt, lower)}">${(+val).toFixed(dec)}${suffix}</td>`;
  };
  const growthCell = (val, tgt) => {
    if (val == null) return "<td>—</td>";
    const cls = colorCls(val, tgt);
    const sign = +val > 0 ? "+" : "";
    return `<td class="${cls}">${sign}${(+val).toFixed(1)}%</td>`;
  };

  return `
    <tr>
      <td class="ticker-cell"><span onclick="document.getElementById('tickerInput').value='${esc(p.ticker)}';runAnalysis();" style="cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(0,229,195,0.4)">${esc(p.ticker) || "—"}</span></td>
      <td class="name-cell">${esc(p.company_name)}</td>
      <td>${p.market_cap_b ? "$" + (+p.market_cap_b).toFixed(0) + "B" : "—"}</td>
      ${cell(p.pe_ratio,          tf.pe_ratio,          1, "", true)}
      ${cell(p.ev_ebitda,         tf.ev_ebitda,         1, "", true)}
      ${cell(p.ps_ratio,          tf.ps_ratio,          1, "", true)}
      ${cell(p.gross_margin,      tf.gross_margin,      1, "%")}
      ${cell(p.operating_margin,  tf.operating_margin,  1, "%")}
      ${cell(p.roic,              tf.roic,              1, "%")}
      ${growthCell(p.revenue_growth_yoy, tf.revenue_growth_yoy)}
      ${growthCell(p.eps_growth_yoy,     tf.eps_growth_yoy)}
      ${cell(p.net_debt_ebitda,   tf.net_debt_ebitda,   1, "x", true)}
      ${cell(p.fcf_yield,         tf.fcf_yield,         1, "%")}
      <td class="score-cell" style="color:${scoreColor(peerOverall ?? 0)}">${peerOverall != null ? Math.round(peerOverall) : "—"}</td>
    </tr>`;
}

function animateRings() {
  requestAnimationFrame(() => {
    document.querySelectorAll(".ring-fill").forEach(el => {
      const score = parseInt(el.dataset.score) || 0;
      const circ = 2 * Math.PI * 36;
      const offset = circ * (1 - score / 100);
      setTimeout(() => { el.style.strokeDashoffset = offset; }, 100);
    });
  });
}
</script>

<script>
// ── Invite code gate ───────────────────────────────────────
(function() {
  const saved = localStorage.getItem("inviteCode");
  if (saved) {
    // Silently verify saved code is still valid
    fetch("/api/verify-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: saved }),
    })
    .then(r => r.json())
    .then(d => { if (!d.valid) { localStorage.removeItem("inviteCode"); showGate(); } else { hideGate(); } })
    .catch(() => hideGate()); // network error — let them through, API will reject if invalid
  } else {
    showGate();
  }
})();

function showGate() { document.getElementById("gate").classList.remove("hidden"); }
function hideGate() { document.getElementById("gate").classList.add("hidden"); }

async function submitCode() {
  const input = document.getElementById("gateInput");
  const errorEl = document.getElementById("gateError");
  const code = input.value.trim().toUpperCase();
  errorEl.textContent = "";
  if (!code) { errorEl.textContent = "Please enter your invite code."; return; }
  try {
    const res = await fetch("/api/verify-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (data.valid) {
      localStorage.setItem("inviteCode", code);
      hideGate();
    } else {
      errorEl.textContent = "Invalid code. Request access via the invite link.";
      input.value = "";
      input.focus();
    }
  } catch {
    errorEl.textContent = "Could not verify code. Please try again.";
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && !document.getElementById("gate").classList.contains("hidden")) {
    submitCode();
  }
});
</script>

<script>
(function() {
  const tip = document.getElementById("fund-tooltip");
  document.addEventListener("mouseover", function(e) {
    const el = e.target.closest("[data-tip]");
    if (!el) return;
    tip.textContent = el.getAttribute("data-tip");
    tip.classList.add("visible");
  });
  document.addEventListener("mousemove", function(e) {
    if (!tip.classList.contains("visible")) return;
    const pad = 12, tw = 220, th = tip.offsetHeight;
    let x = e.clientX + pad;
    let y = e.clientY - th - pad;
    if (x + tw > window.innerWidth) x = e.clientX - tw - pad;
    if (y < 0) y = e.clientY + pad;
    tip.style.left = x + "px";
    tip.style.top  = y + "px";
  });
  document.addEventListener("mouseout", function(e) {
    if (!e.target.closest("[data-tip]")) return;
    tip.classList.remove("visible");
  });
})();
</script>
