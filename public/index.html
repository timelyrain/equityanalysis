<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EQA — Equity Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@700;800;900&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #05060f;
      --bg-card:   #0b0d1a;
      --bg-hover:  #111428;
      --border:    rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --teal:      #00e5c3;
      --teal-dim:  rgba(0,229,195,0.12);
      --teal-glow: rgba(0,229,195,0.25);
      --amber:     #f5a623;
      --amber-dim: rgba(245,166,35,0.12);
      --red:       #ff4757;
      --red-dim:   rgba(255,71,87,0.12);
      --green:     #2ed573;
      --green-dim: rgba(46,213,115,0.12);
      --yellow:    #ffd32a;
      --text-1:    #e8eaf6;
      --text-2:    #8892b0;
      --text-3:    #4a5578;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,229,195,0.04) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    }

    /* ─── NAV ─────────────────────────────────────────── */

    /* ─── SEARCH BAR ──────────────────────────────────── */
    .search-section {
      max-width: 960px;
      margin: 60px auto 0;
      padding: 0 24px;
      text-align: center;
    }
    .search-headline-wrap { display: block; text-align: center; }
    .search-headline {
      font-family: 'Orbitron', var(--mono);
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1;
      background: linear-gradient(180deg, #ffffff 0%, #c8d0e0 30%, #8892a8 65%, #5a6278 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
      display: block;
    }
    .search-headline-sub {
      font-family: var(--mono);
      font-size: clamp(0.5rem, 2.8vw, 1.05rem);
      font-weight: 500;
      letter-spacing: clamp(0.08em, 0.8vw, 0.38em);
      color: var(--text-2);
      margin-bottom: 6px;
      display: block;
      text-align: center;
      white-space: nowrap;
    }
    .search-sub {
      font-size: 0.65rem;
      color: var(--text-3);
      letter-spacing: 0.08em;
      margin-bottom: 36px;
    }
    .search-row {
      display: flex;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .suggest-box {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      overflow-y: auto;
      max-height: 55vh;
      -webkit-overflow-scrolling: touch;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .suggest-box.visible { display: block; }
    .suggest-item {
      display: flex;
      align-items: center;
      min-height: 44px;
      padding: 10px 16px;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover, .suggest-item.active { background: var(--bg-hover); }
    .suggest-ticker {
      font-family: var(--mono);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 0.06em;
      min-width: 58px;
      flex-shrink: 0;
    }
    .suggest-name {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-2);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .suggest-badge {
      font-family: var(--mono);
      font-size: 0.62rem;
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--amber-dim);
      color: var(--amber);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .suggest-exchange {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-3);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    @media (max-width: 480px) {
      .suggest-box { max-height: 45vh; }
      .suggest-name { font-size: 0.72rem; }
    }
    .ticker-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-1);
      letter-spacing: 0.12em;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .ticker-input::placeholder { color: var(--text-3); letter-spacing: 0.08em; text-transform: none; }
    .ticker-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-dim);
    }
    .analyze-btn {
      background: var(--teal);
      color: #05060f;
      border: none;
      border-radius: 6px;
      padding: 14px 28px;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .analyze-btn:hover { background: #00f0cc; box-shadow: 0 0 24px var(--teal-glow); }
    .analyze-btn:active { transform: scale(0.98); }
    .analyze-btn:disabled { background: var(--text-3); cursor: not-allowed; box-shadow: none; }

    @media (max-width: 480px) {
      .search-section { padding: 0 16px; }
      .search-row { gap: 8px; }
      .analyze-btn { padding: 14px 18px; }
    }

    /* ─── STATUS / ERROR ──────────────────────────────── */
    .status-bar {
      max-width: 960px;
      margin: 20px auto 0;
      padding: 0 24px;
      display: none;
    }
    .status-bar.visible { display: block; }
    .status-msg {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      font-size: 0.8rem;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-msg.error { border-color: var(--red); color: var(--red); background: var(--red-dim); }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── DASHBOARD ───────────────────────────────────── */
    #dashboard {
      max-width: 1200px;
      margin: 40px auto 80px;
      padding: 0 24px;
      display: none;
    }
    #dashboard.visible { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── COMPANY HEADER ──────────────────────────────── */
    .company-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .company-left {}
    .company-ticker {
      font-family: var(--sans);
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--teal);
      line-height: 1;
    }
    .company-name {
      font-family: var(--sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
      margin-top: 4px;
    }
    .company-meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .meta-pill {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-2);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 3px;
    }
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      position: relative;
      cursor: default;
    }
    .verdict-badge .short-tooltip { width: 320px; left: 0; top: calc(100% + 8px); }
    .verdict-STRONG-BUY  { background: rgba(46,213,115,0.15); border: 1px solid var(--green); color: var(--green); }
    .verdict-BUY         { background: rgba(0,229,195,0.12);  border: 1px solid var(--teal);  color: var(--teal); }
    .verdict-HOLD        { background: rgba(255,211,42,0.12); border: 1px solid var(--yellow); color: var(--yellow); }
    .verdict-UNDERPERFORM{ background: rgba(245,166,35,0.12); border: 1px solid var(--amber);  color: var(--amber); }
    .verdict-AVOID       { background: rgba(255,71,87,0.12);  border: 1px solid var(--red);   color: var(--red); }
    .analyst-view {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 2px solid var(--teal);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.74rem;
      color: var(--text-2);
      line-height: 1.7;
    }
    .target-price-block {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }
    .target-price-val {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-1);
    }
    .target-price-lbl {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .upside-tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .upside-tag.up   { background: rgba(46,213,115,0.12); color: var(--green); }
    .upside-tag.down { background: rgba(255,71,87,0.12);  color: var(--red); }

    /* ─── SHORT INTEREST ─────────────────────────────── */
    .short-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .short-item { display: flex; flex-direction: column; gap: 3px; }
    .short-lbl { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); }
    .short-val { font-family: var(--mono); font-size: 0.9rem; font-weight: 600; color: var(--text-1); }
    .short-signal {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 4px;
      letter-spacing: 0.06em;
    }
    .sig-LOW            { background: rgba(46,213,115,0.12);  color: var(--green);  border: 1px solid var(--green); }
    .sig-NORMAL         { background: rgba(0,229,195,0.08);   color: var(--teal);   border: 1px solid var(--teal); }
    .sig-ELEVATED       { background: rgba(255,211,42,0.12);  color: var(--yellow); border: 1px solid var(--yellow); }
    .sig-HIGH           { background: rgba(245,166,35,0.12);  color: var(--amber);  border: 1px solid var(--amber); }
    .sig-EXTREME        { background: rgba(255,71,87,0.12);   color: var(--red);    border: 1px solid var(--red); }
    .sig-SQUEEZE        { background: rgba(255,71,87,0.18);   color: var(--red);    border: 1px solid var(--red); }
    .sig-UNKNOWN        { background: transparent; color: var(--text-3); border: 1px solid var(--border); }
    .short-signal-wrap  { position: relative; display: inline-block; cursor: default; }
    .short-tooltip {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 200;
      background: #13152a;
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 300px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      font-weight: 400;
      letter-spacing: normal;
    }
    .short-signal-wrap:hover .short-tooltip { display: block; }
    .tooltip-title {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 16px;
    }
    .tooltip-row:last-child { border-bottom: none; }
    .tooltip-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 3px;
      white-space: nowrap;
    }
    .tooltip-desc { font-size: 0.68rem; color: var(--text-2); text-align: right; }
    .tooltip-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 10px 0;
    }

    /* ─── RANKING BANNER ──────────────────────────────── */
    .ranking-banner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .rank-item { text-align: center; }
    .rank-val {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--teal);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .rank-lbl {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 6px;
    }
    .rank-divider { width: 1px; height: 40px; background: var(--border); }
    .rank-cards { display:flex; gap:0; align-items:flex-start; flex-wrap:wrap; }
    .rank-card-item { width:75px; }
    .rank-cards-wrap { position:relative; }
    .table-scroll-wrap { position:relative; }
    @media (max-width: 600px) {
      .ranking-banner { flex-direction:column; gap:14px; padding:14px 16px; }
      .rank-divider { width:100%; height:1px; }
      .rank-item { width:100%; }
      .rank-cards { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px 0; overflow-x:visible; width:100%; padding:4px 0; }
      .rank-card-item { width:100%; }
      .rank-card-sep { display:none; }
      .table-scroll-wrap::after {
        content:''; position:absolute; top:0; right:0; bottom:0; width:48px;
        background:linear-gradient(to right, transparent, var(--bg));
        pointer-events:none; border-radius:0 8px 8px 0;
      }
    }

    /* ─── SCORE GRID ──────────────────────────────────── */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    @media (max-width: 768px) { .scores-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 480px) { .scores-grid { grid-template-columns: repeat(2, 1fr); } }

    .score-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s;
      position: relative;
      cursor: default;
    }
    .score-card:hover { border-color: var(--border-hi); }
    .score-card .short-tooltip { width: 270px; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
    .score-card:hover .short-tooltip { display: block; }
    .score-card.overall {
      border-color: rgba(0,229,195,0.3);
      background: linear-gradient(135deg, var(--bg-card), rgba(0,229,195,0.04));
    }
    .ring-wrap { position: relative; width: 88px; height: 88px; }
    .score-ring { width: 88px; height: 88px; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border-hi); stroke-width: 5; }
    .ring-fill {
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 226.2;
      stroke-dashoffset: 226.2;
      transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .ring-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--sans);
      font-size: 1.3rem;
      font-weight: 800;
    }
    .score-label {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .score-rank {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-1);
    }

    /* ─── SECTION TITLE ───────────────────────────────── */
    .section-title {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-1);
      font-weight: 700;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ─── FUNDAMENTALS GRID ───────────────────────────── */
    .fundamentals-section { margin-bottom: 36px; }
    .fund-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    @media (max-width: 768px) { .fund-grid { grid-template-columns: repeat(2, 1fr); } }
    .fund-group {
      background: var(--bg-card);
      padding: 16px 18px;
    }
    .fund-group-title {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 12px;
      opacity: 0.7;
    }
    .fund-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .fund-row:last-child { border-bottom: none; }
    .fund-key { font-size: 0.68rem; color: var(--text-2); cursor: default; }
    .fund-key[data-tip] { border-bottom: 1px dashed rgba(255,255,255,0.2); }
    #fund-tooltip {
      position: fixed;
      z-index: 9999;
      background: #1e2530;
      color: var(--text-1);
      font-size: 0.62rem;
      font-family: var(--mono);
      line-height: 1.5;
      padding: 8px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      width: 220px;
      white-space: normal;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      text-align: left;
      font-weight: 400;
      letter-spacing: 0;
    }
    #fund-tooltip.visible { opacity: 1; }
    .fund-val { font-size: 0.78rem; font-weight: 500; color: var(--text-1); }
    .fund-val.positive { color: var(--green); }
    .fund-val.negative { color: var(--red); }
    .fund-val.neutral  { color: var(--yellow); }
    .fund-val.na { color: var(--text-3); }

    /* ─── PEER COMPARISON TABLE ───────────────────────── */
    .peers-section { margin-bottom: 36px; }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 8px;
      border: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.12) transparent;
    }
    .table-wrap::-webkit-scrollbar { height: 4px; }
    .table-wrap::-webkit-scrollbar-track { background: transparent; }
    .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
    .table-wrap::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    thead tr { background: rgba(0,229,195,0.05); border-bottom: 1px solid var(--border); }
    th {
      padding: 10px 14px;
      text-align: right;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      white-space: nowrap;
    }
    th:first-child, th:nth-child(2) { text-align: left; }
    td {
      padding: 10px 14px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text-2);
      white-space: nowrap;
    }
    td:first-child, td:nth-child(2) { text-align: left; }
    tr:last-child td { border-bottom: none; }
    tr.target-row { background: rgba(0,229,195,0.04); }
    tr.target-row td { color: var(--text-1); }
    .ticker-cell { font-weight: 600; color: var(--teal); }
    .name-cell { color: var(--text-2); font-size: 0.68rem; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    tr.target-row .name-cell { color: var(--text-1); }
    .score-cell {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .cell-up   { color: var(--green); }
    .cell-down { color: var(--red); }
    .cell-flat { color: var(--yellow); }
    .star { color: var(--teal); margin-left: 4px; font-size: 0.65rem; }

    /* ─── CASES + SIGNALS ─────────────────────────────── */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }
    @media (max-width: 600px) { .bottom-grid { grid-template-columns: 1fr; } }

    .case-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .case-card.bull { border-top: 2px solid var(--green); }
    .case-card.bear { border-top: 2px solid var(--red); }
    .case-tag {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .case-tag.bull { color: var(--green); }
    .case-tag.bear { color: var(--red); }
    .case-sublabel {
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 12px 0 6px;
    }
    .case-sublabel:first-of-type { margin-top: 0; }
    .case-text { font-size: 0.72rem; color: var(--text-2); line-height: 1.7; }
    .case-point { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .case-point:last-child { border-bottom: none; }

    /* ─── GATE SCREEN ─────────────────────────────────── */
    #gate {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #gate.hidden { display: none; }
    .gate-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%; max-width: 420px;
      overflow: hidden;
      display: flex; flex-direction: column; gap: 16px;
      text-align: center;
    }
    .gate-title { font-size: 1.4rem; font-weight: 700; color: var(--text-1); }
    .gate-sub { font-size: 0.72rem; color: var(--text-3); letter-spacing: 0.04em; }
    .gate-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-1);
      font-family: var(--mono); font-size: 0.9rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-align: center; outline: none; box-sizing: border-box;
    }
    .gate-input:focus { border-color: var(--teal); }
    .gate-btn {
      padding: 12px; border-radius: 8px;
      background: var(--teal); color: #000;
      font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      border: none; cursor: pointer;
    }
    .gate-btn:hover { opacity: 0.85; }
    .gate-error { font-size: 0.68rem; color: var(--red); min-height: 1em; }
  </style>
</head>
<body>

<!-- INVITE CODE GATE -->
<div id="gate">
  <div class="gate-box">
    <div style="text-align:center;margin-bottom:4px">
      <span class="search-headline" style="font-size:clamp(2rem,7vw,3.2rem)">EQA</span>
      <span class="search-headline-sub">EQUITY ANALYSIS</span>
    </div>
    <div class="gate-sub">This tool is invite-only.<br>Enter your access code to continue.</div>
    <input id="gateInput" class="gate-input" type="text" placeholder="XXXX-XXXX" maxlength="20" autocomplete="off" spellcheck="false" />
    <button class="gate-btn" onclick="submitCode()">Unlock Access</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<section class="search-section">
  <div class="search-headline-wrap">
    <span class="search-headline">EQA</span>
    <span class="search-headline-sub" style="margin-bottom:20px">EQUITY ANALYSIS</span>
  </div>
  <p class="search-sub" style="margin-top:-8px">Fundamental Scoring · Sector Benchmarking · Technical Timing · Analyst Consensus</p>
  <div class="search-row">
    <div class="search-input-wrap">
      <input
        id="tickerInput"
        class="ticker-input"
        type="text"
        placeholder="Ticker or company"
        maxlength="60"
        autocomplete="off"
        autocapitalize="none"
        spellcheck="false"
      />
      <div id="suggestBox" class="suggest-box"></div>
    </div>
    <button id="analyzeBtn" class="analyze-btn" onclick="runAnalysis()">Analyze</button>
  </div>
</section>

<div class="status-bar" id="statusBar">
  <div class="status-msg" id="statusMsg">
    <div class="spinner" id="statusSpinner"></div>
    <span id="statusText">Searching live market data and running analysis…</span>
  </div>
</div>

<div id="dashboard">
  <!-- rendered dynamically -->
</div>


<script>
if ("scrollRestoration" in history) history.scrollRestoration = "manual";
const API_URL = "/api/analyze";

function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function currencySymbol(currency) {
  const map = {
    USD:"$", EUR:"€", GBP:"£", HKD:"HK$", JPY:"¥", CNY:"¥",
    AUD:"A$", CAD:"C$", CHF:"CHF ", SGD:"S$", KRW:"₩", INR:"₹",
    BRL:"R$", MXN:"MX$", ZAR:"R ", TWD:"NT$", SEK:"SEK ", NOK:"NOK ", DKK:"DKK ",
    MYR:"RM ", IDR:"Rp ", THB:"฿", PHP:"₱", VND:"₫",
  };
  return map[currency] || (currency ? currency + " " : "$");
}

async function runAnalysis() {
  const ticker = document.getElementById("tickerInput").value.trim().toUpperCase();
  if (!ticker) return;

  const btn = document.getElementById("analyzeBtn");
  const statusBar = document.getElementById("statusBar");
  const statusMsg = document.getElementById("statusMsg");
  const statusText = document.getElementById("statusText");
  const spinner = document.getElementById("statusSpinner");
  const dashboard = document.getElementById("dashboard");

  btn.disabled = true;
  dashboard.classList.remove("visible");
  statusBar.classList.add("visible");
  statusMsg.className = "status-msg";
  spinner.style.display = "block";
  statusText.textContent = `Analysing ${ticker}…`;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Invite-Code": localStorage.getItem("inviteCode") || "" },
      body: JSON.stringify({ ticker }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "Analysis failed");

    renderDashboard(data);
    const deployFooter = document.getElementById("deploy-footer");
    if (deployFooter && buildTime) deployFooter.textContent = "Last deployment: " + buildTime;
    statusBar.classList.remove("visible");
    dashboard.classList.add("visible");
    dashboard.scrollIntoView({ behavior: "smooth", block: "start" });

  } catch (err) {
    statusMsg.className = "status-msg error";
    spinner.style.display = "none";
    statusText.textContent = `Error: ${err.message}`;
  }

  btn.disabled = false;
}

// ── Autocomplete ─────────────────────────────────────────────
(function () {
  const input = document.getElementById("tickerInput");
  const box   = document.getElementById("suggestBox");
  let timer = null, activeIdx = -1, items = [];

  function hide() {
    box.classList.remove("visible");
    box.innerHTML = "";
    activeIdx = -1;
    items = [];
  }

  function pick(symbol) {
    input.value = symbol;
    hide();
    runAnalysis();
  }

  function setActive(idx) {
    activeIdx = idx;
    box.querySelectorAll(".suggest-item").forEach((el, i) =>
      el.classList.toggle("active", i === idx)
    );
  }

  function render(results) {
    if (!results.length) { hide(); return; }
    items = results;
    activeIdx = -1;
    box.innerHTML = results.map((r, i) => {
      const isEquity = r.quoteType === "EQUITY";
      const badge = !isEquity
        ? `<span class="suggest-badge">${esc(r.quoteType)}</span>` : "";
      return `<div class="suggest-item" data-i="${i}" style="${!isEquity ? "opacity:0.6" : ""}">
        <span class="suggest-ticker" style="${!isEquity ? "color:var(--text-2)" : ""}">${esc(r.symbol)}</span>
        <span class="suggest-name">${esc(r.shortname || r.longname || "")}</span>
        ${badge}
        <span class="suggest-exchange">${esc(r.exchDisp || r.exchange || "")}</span>
      </div>`;
    }).join("");
    // attach events after render so we can use pick() cleanly
    box.querySelectorAll(".suggest-item").forEach((el, i) => {
      // prevent input blur on desktop before click fires
      el.addEventListener("mousedown", e => e.preventDefault());
      // prevent scroll-jank on iOS and handle tap
      el.addEventListener("touchstart", e => e.preventDefault(), { passive: false });
      el.addEventListener("touchend", e => { e.preventDefault(); pick(items[i].symbol); });
      el.addEventListener("click", () => pick(items[i].symbol));
    });
    box.classList.add("visible");
  }

  async function suggest(q) {
    try {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
      if (!res.ok) return;
      const data = await res.json();
      render(data.quotes || []);
    } catch { hide(); }
  }

  input.addEventListener("input", () => {
    const q = input.value.trim();
    clearTimeout(timer);
    if (q.length < 1) { hide(); return; }
    timer = setTimeout(() => suggest(q), 200);
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (activeIdx >= 0 && items[activeIdx]) {
        e.preventDefault();
        pick(items[activeIdx].symbol);
      } else {
        hide();
        runAnalysis();
      }
      return;
    }
    if (!box.classList.contains("visible")) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setActive(Math.min(activeIdx + 1, items.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setActive(Math.max(activeIdx - 1, -1));
    } else if (e.key === "Escape") {
      hide();
    }
  });

  function outsideDismiss(e) {
    if (!box.contains(e.target) && e.target !== input) hide();
  }
  document.addEventListener("click", outsideDismiss);
  document.addEventListener("touchstart", outsideDismiss, { passive: true });
})();

// ── Render helpers ─────────────────────────────────────────

const TIER_COLORS = { A: "#2ed573", B: "#00e5c3", C: "#ffd32a", D: "#f5a623", F: "#ff4757" };
function toTier(score) {
  const t = score >= 85 ? "A" : score >= 70 ? "B" : score >= 50 ? "C" : score >= 35 ? "D" : "F";
  return `<span style="color:${TIER_COLORS[t]}">${t}</span>`;
}

let _collapseId = 0;
function renderPoints(points) {
  if (!points || points.length === 0) return "";
  const visible = points.slice(0, 3);
  const hidden  = points.slice(3);
  const id = "cp" + (++_collapseId);
  const visibleHtml = visible.map(p => `<div class="case-point">· ${esc(p)}</div>`).join("");
  if (hidden.length === 0) return visibleHtml;
  const hiddenHtml = hidden.map(p => `<div class="case-point">· ${esc(p)}</div>`).join("");
  return `${visibleHtml}
    <div id="${id}" style="display:none">${hiddenHtml}</div>
    <button onclick="(function(b){var d=document.getElementById('${id}');var open=d.style.display!=='none';d.style.display=open?'none':'block';b.textContent=open?'Show ${hidden.length} more ▾':'Show less ▴';})(this)"
      style="background:none;border:none;color:var(--text-3);font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;padding:6px 0 2px;font-family:var(--mono)">Show ${hidden.length} more ▾</button>`;
}

function fmtNum(v, dec=1, suffix="") {
  if (v === null || v === undefined) return '<span class="fund-val na">—</span>';
  return `<span class="fund-val">${(+v).toFixed(dec)}${suffix}</span>`;
}

function fmtPct(v) {
  if (v === null || v === undefined) return '<span class="fund-val na">—</span>';
  const cls = +v > 0 ? "positive" : +v < 0 ? "negative" : "";
  return `<span class="fund-val ${cls}">${(+v).toFixed(1)}%</span>`;
}

function fmtGrowth(v) {
  if (v === null || v === undefined) return '<span class="fund-val na">—</span>';
  const cls = +v > 0 ? "positive" : +v < 0 ? "negative" : "neutral";
  const sign = +v > 0 ? "+" : "";
  return `<span class="fund-val ${cls}">${sign}${(+v).toFixed(1)}%</span>`;
}

function shortSignalClass(signal) {
  if (!signal) return "sig-UNKNOWN";
  if (signal.includes("SQUEEZE")) return "sig-SQUEEZE";
  return "sig-" + signal.split(" ")[0];
}

function shortInterpretation(signal, shortFloat, shortRatio, overallScore) {
  if (!signal || signal === "UNKNOWN") return "Data unavailable";
  if (overallScore == null) return "Sentiment context unavailable — scoring data incomplete.";
  const isHigh     = ["HIGH", "EXTREME", "SQUEEZE CANDIDATE"].includes(signal);
  const isElevated = signal === "ELEVATED";
  const isLow      = ["LOW", "NORMAL"].includes(signal);
  const strong     = overallScore >= 65;
  const weak       = overallScore < 45;
  const slowUnwind = shortRatio != null && shortRatio >= 7;

  if (signal === "SQUEEZE CANDIDATE")
    return "High short + slow unwind — any upward catalyst risks cascading short covering";
  if (isHigh && weak)
    return "Bearish confirmation — institutional shorts agree with weak fundamentals";
  if (isHigh && strong)
    return "Tension signal — shorts fighting strong fundamentals, contrarian squeeze potential";
  if (isHigh && slowUnwind)
    return "Slow unwind speed — even a small rally could trigger cascading short covering";
  if (isLow && strong)
    return "Clean bull setup — strong fundamentals with no short headwinds";
  if (isElevated && strong)
    return "Bears testing strong fundamentals — watch for squeeze if momentum builds";
  if (isElevated && weak)
    return "Bearish pressure building — shorts gaining conviction on weak fundamentals";
  const defaults = {
    "LOW":    "Few bears — market has broad confidence in the stock",
    "NORMAL": "Normal short activity — broadly neutral market sentiment",
    "ELEVATED":"Meaningful bearish positioning — some institutional skepticism",
    "HIGH":   "Significant institutional short thesis in play",
    "EXTREME":"Heavy shorting — high conviction bears dominating",
  };
  return defaults[signal] || "";
}

function scoreColor(s) {
  if (s >= 75) return "#2ed573";
  if (s >= 55) return "#00e5c3";
  if (s >= 40) return "#ffd32a";
  if (s >= 25) return "#f5a623";
  return "#ff4757";
}

function ringOffset(score) {
  const circ = 226.2;
  return circ * (1 - score / 100);
}

function cellClass(val, targetVal, lowerBetter=false) {
  if (val === null || targetVal === null) return "";
  const better = lowerBetter ? val < targetVal : val > targetVal;
  const worse  = lowerBetter ? val > targetVal : val < targetVal;
  const diff   = Math.abs((val - targetVal) / (Math.abs(targetVal) || 1));
  if (diff < 0.05) return "cell-flat";
  return better ? "cell-up" : "cell-down";
}

function tdVal(val, target, dec=1, suffix="", lowerBetter=false) {
  if (val === null || val === undefined) return '<td>—</td>';
  const cls = target !== null ? cellClass(val, target, lowerBetter) : "";
  return `<td class="${cls}">${(+val).toFixed(dec)}${suffix}</td>`;
}

// ── Main render ────────────────────────────────────────────

function renderDashboard(d) {
  const f = d.fundamentals || {};
  const s = d.scores || {};
  const r = d.rankings || {};
  const peers = d.competitors || [];
  const verdictKey = (d.analyst_verdict || "HOLD").replace(/ /g, "-");

  const missing = [];
  if (!d.scores)                                      missing.push("Scoring");
  if (!d.competitors || d.competitors.length === 0)   missing.push("Peer comparison");
  else if (d.peers_found != null && d.peers_found < 3) missing.push(`Peer comparison (only ${d.peers_found} peer${d.peers_found === 1 ? "" : "s"} retrieved — scores unreliable)`);
  if (!d.earnings_date)                      missing.push("Earnings date");
  if (!d.verdict_rationale)                  missing.push("Analyst narrative");
  if (!d.investment_case?.present?.length) missing.push("Investment case");
  if (!d.key_risks?.present?.length)       missing.push("Key risks");

  const cacheLabel = `<span style="margin-left:auto;opacity:0.5;font-size:0.6rem;">${d.cache_hit ? "⚡ served from cache" : "↻ freshly fetched"}</span>`;
  const resolvedLabel = d.resolved_from ? `<span style="opacity:0.7;font-size:0.6rem;">&#128269; "${esc(d.resolved_from)}" resolved to ${esc(d.ticker)}</span>` : "";
  const dataBanner = missing.length === 0
    ? `<div style="background:rgba(0,229,195,0.06);border:1px solid rgba(0,229,195,0.25);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:0.68rem;color:var(--teal);display:flex;align-items:center;gap:8px;">
        <span>&#10003;</span> All data retrieved successfully. ${resolvedLabel} ${cacheLabel}
       </div>`
    : `<div style="background:rgba(255,180,0,0.08);border:1px solid rgba(255,180,0,0.3);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:0.68rem;color:var(--yellow);display:flex;align-items:center;gap:8px;">
        <span>&#9888;</span> Incomplete data &mdash; missing: ${missing.join(", ")}. ${resolvedLabel} ${cacheLabel}
       </div>`;

  const html = `
    ${dataBanner}
    <!-- COMPANY HEADER -->
    <div class="company-header">
      <div class="company-left">
        <div style="display:flex;align-items:baseline;gap:14px;">
          <div class="company-ticker">${esc(d.ticker)}</div>
          ${d.current_price ? `<div style="font-family:var(--mono);font-size:1.2rem;font-weight:500;color:var(--text-2);">${currencySymbol(d.currency)}${(+d.current_price).toFixed(2)}</div>` : ""}
        </div>
        <div class="company-name">${esc(d.company_name)}</div>
        <div class="company-meta">
          <span class="meta-pill">${esc(d.sector)}</span>
          <span class="meta-pill">${esc(d.industry)}</span>
          ${f.market_cap_b ? `<span class="meta-pill">Mkt Cap ${currencySymbol(d.currency)}${(+f.market_cap_b).toFixed(1)}B</span>` : ""}
          ${d.is_international && d.currency && d.currency !== "USD" ? `<span class="meta-pill" style="color:var(--amber)">${esc(d.currency)}</span>` : ""}
          ${d.earnings_date ? `<span class="meta-pill short-signal-wrap" style="color:var(--teal);cursor:default">&#9656; Earnings ${esc(d.earnings_date)}<div class="short-tooltip" style="width:300px;left:0;top:calc(100% + 8px)"><div class="tooltip-title">Why Earnings Date Matters</div><div class="tooltip-row" style="display:block;padding:2px 0"><span class="tooltip-desc" style="text-align:left">Earnings releases trigger sharp price moves — often ±5–15% overnight. Initiating a new position within 1–2 weeks of this date carries event risk.</span></div><hr class="tooltip-divider"/><div class="tooltip-row"><span class="tooltip-badge sig-ELEVATED">New position</span><span class="tooltip-desc">Consider waiting for the report to clear before entering</span></div><div class="tooltip-row"><span class="tooltip-badge sig-UNKNOWN">Holding through</span><span class="tooltip-desc">Be aware of volatility risk — consider sizing down</span></div></div></span>` : ""}
        </div>
      </div>
      <div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="verdict-badge verdict-${esc(verdictKey)} short-signal-wrap">
            <span>${esc(d.analyst_verdict) || "HOLD"}</span>
            <div class="short-tooltip">
              <div class="tooltip-title">How the Overall Verdict is derived</div>
              <div class="tooltip-row"><span class="tooltip-badge sig-LOW">Analyst Consensus</span><span class="tooltip-desc">40% — sell-side avg recommendation</span></div>
              <div class="tooltip-row"><span class="tooltip-badge sig-NORMAL">Price Target Upside</span><span class="tooltip-desc">35% — gap to consensus target</span></div>
              <div class="tooltip-row"><span class="tooltip-badge sig-UNKNOWN">Peer Quality Score</span><span class="tooltip-desc">25% — fundamentals vs peers</span></div>
              <hr class="tooltip-divider"/>
              <div class="tooltip-title">Composite score thresholds</div>
              <div class="tooltip-row"><span class="tooltip-badge verdict-STRONG-BUY">STRONG BUY</span><span class="tooltip-desc">≥ 78</span></div>
              <div class="tooltip-row"><span class="tooltip-badge verdict-BUY">BUY</span><span class="tooltip-desc">≥ 62</span></div>
              <div class="tooltip-row"><span class="tooltip-badge verdict-HOLD">HOLD</span><span class="tooltip-desc">≥ 42</span></div>
              <div class="tooltip-row"><span class="tooltip-badge verdict-UNDERPERFORM">UNDERPERFORM</span><span class="tooltip-desc">≥ 28</span></div>
              <div class="tooltip-row"><span class="tooltip-badge verdict-AVOID">AVOID</span><span class="tooltip-desc">&lt; 28</span></div>
              ${d.verdict_composite != null ? `<hr class="tooltip-divider"/><div class="tooltip-row"><span class="tooltip-desc" style="text-align:left;color:var(--text-3)">This stock's composite score</span><span class="tooltip-desc" style="color:rgba(255,255,255,0.8);font-weight:600">${d.verdict_composite}</span></div>` : ""}
              <hr class="tooltip-divider"/>
              <div class="tooltip-row" style="display:block;padding:2px 0"><span class="tooltip-desc" style="text-align:left;color:rgba(255,255,255,0.35)">Quantitative signal only — not a financial recommendation. Always conduct your own due diligence.</span></div>
            </div>
          </div>
          ${(() => {
            const tp = d.target_price, cp = d.current_price;
            if (!tp) return "";
            const upside = cp ? ((tp - cp) / cp * 100) : null;
            const upsideHtml = upside !== null
              ? `<span class="upside-tag ${upside >= 0 ? "up" : "down"}">${upside >= 0 ? "+" : ""}${upside.toFixed(1)}%</span>`
              : "";
            const spyHtml = d.vs_sp500 != null
              ? `<span class="upside-tag ${d.vs_sp500 >= 0 ? "up" : "down"}">${d.vs_sp500 >= 0 ? "+" : ""}${d.vs_sp500.toFixed(1)}% vs SPY</span>`
              : "";
            return `<div>
              <div class="target-price-block">
                <div>
                  <div class="target-price-lbl">Analyst Target</div>
                  <div class="target-price-val">${currencySymbol(d.currency)}${(+tp).toFixed(2)}</div>
                </div>
                ${upsideHtml}
                ${spyHtml}
              </div>
            </div>`;
          })()}
        </div>
      </div>
    </div>

    <!-- ANALYST VIEW -->
    ${d.verdict_rationale ? `<div class="analyst-view">${esc(d.verdict_rationale)}</div>` : ""}

    <!-- SHORT INTEREST -->
    ${d.short_signal ? `
    <div class="section-title" style="margin-bottom:10px;">Market Sentiment</div>
    <div class="short-bar">
      <div class="short-item">

        <div class="short-item" style="flex:1;min-width:0">
          <span class="short-lbl">Key Signals</span>
          <span style="font-size:0.72rem;color:var(--text-2)">${esc(reasons)}</span>
        </div>
        ${t.commentary ? `
        <div class="short-item" style="flex-basis:100%;border-top:1px solid var(--border);padding-top:10px;min-width:0">
          <span class="short-lbl">Final Takeaway</span>
          <span style="font-size:0.72rem;font-style:italic;color:var(--text-2);line-height:1.6;">${esc(t.commentary)}</span>
        </div>` : ""}
      </div>`;
    })() : ""}

    <div style="text-align:center;padding:24px 0 8px;font-size:0.62rem;color:var(--text-3);letter-spacing:0.08em;border-top:1px solid var(--border);margin-top:24px;" id="deploy-footer"></div>
  `;

  document.getElementById("dashboard").innerHTML = html;
  animateRings();
}

function renderScoreCard(label, score, rank, total, isOverall, tooltip) {
  const s = score ?? 0;
  const color = scoreColor(s);
  return `
    <div class="score-card ${isOverall ? "overall" : ""}">
      <div class="ring-wrap">
        <svg class="score-ring" viewBox="0 0 88 88">
          <circle class="ring-bg" cx="44" cy="44" r="36"/>
          <circle class="ring-fill" cx="44" cy="44" r="36"
            data-score="${s}"
            style="stroke:${color}; stroke-dashoffset:226.2"/>
        </svg>
        <div class="ring-num" style="color:${color}">${s}</div>
      </div>
      <div class="score-label">${label}</div>
      <div class="score-rank">Tier ${toTier(s)}</div>
      ${tooltip ? `<div class="short-tooltip">${tooltip}</div>` : ""}
    </div>`;
}

function renderTargetRow(d, overall) {
  const f = d.fundamentals || {};
  return `
    <tr class="target-row">
      <td class="ticker-cell">${esc(d.ticker)}<span class="star">★</span></td>
      <td class="name-cell">${esc(d.company_name)}</td>
      <td class="score-cell" style="color:${scoreColor(overall ?? 0)}">${overall ?? "—"}</td>
      <td>${f.market_cap_b ? currencySymbol(d.currency) + (+f.market_cap_b).toFixed(0) + "B" : "—"}</td>
      <td>${f.pe_ratio != null ? (+f.pe_ratio).toFixed(1) : "—"}</td>
      <td>${f.ev_ebitda != null ? (+f.ev_ebitda).toFixed(1) : "—"}</td>
      <td>${f.ps_ratio != null ? (+f.ps_ratio).toFixed(1) : "—"}</td>
      <td>${f.gross_margin != null ? (+f.gross_margin).toFixed(1) + "%" : "—"}</td>
      <td>${f.operating_margin != null ? (+f.operating_margin).toFixed(1) + "%" : "—"}</td>
      <td>${f.roic != null ? (+f.roic).toFixed(1) + "%" : "—"}</td>
      <td>${f.revenue_growth_yoy != null ? (f.revenue_growth_yoy > 0 ? "+" : "") + (+f.revenue_growth_yoy).toFixed(1) + "%" : "—"}</td>
      <td>${f.eps_growth_yoy != null ? (f.eps_growth_yoy > 0 ? "+" : "") + (+f.eps_growth_yoy).toFixed(1) + "%" : "—"}</td>
      <td>${f.net_debt_ebitda != null ? (+f.net_debt_ebitda).toFixed(1) + "x" : "—"}</td>
      <td>${f.fcf_yield != null ? (+f.fcf_yield).toFixed(1) + "%" : "—"}</td>
    </tr>`;
}

function renderPeerRow(p, tf, peerScores, currency) {
  const peerOverall = peerScores?.[p.ticker]?.overall ?? null;
  const colorCls = (val, tgt, lowerBetter=false) => {
    if (val == null || tgt == null) return "";
    const better = lowerBetter ? +val < +tgt : +val > +tgt;
    const diff = Math.abs((val - tgt) / (Math.abs(tgt) || 1));
    if (diff < 0.05) return "cell-flat";
    return better ? "cell-up" : "cell-down";
  };
  const cell = (val, tgt, dec, suffix, lower=false) => {
    if (val == null) return "<td>—</td>";
    return `<td class="${colorCls(val, tgt, lower)}">${(+val).toFixed(dec)}${suffix}</td>`;
  };
  const growthCell = (val, tgt) => {
    if (val == null) return "<td>—</td>";
    const cls = colorCls(val, tgt);
    const sign = +val > 0 ? "+" : "";
    return `<td class="${cls}">${sign}${(+val).toFixed(1)}%</td>`;
  };

  return `
    <tr>
      <td class="ticker-cell"><span onclick="document.getElementById('tickerInput').value='${esc(p.ticker)}';runAnalysis();" style="cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(0,229,195,0.4)">${esc(p.ticker) || "—"}</span></td>
      <td class="name-cell">${esc(p.company_name)}</td>
      <td class="score-cell" style="color:${scoreColor(peerOverall ?? 0)}">${peerOverall != null ? Math.round(peerOverall) : "—"}</td>
      <td>${p.market_cap_b ? currencySymbol(currency) + (+p.market_cap_b).toFixed(0) + "B" : "—"}</td>
      ${cell(p.pe_ratio,          tf.pe_ratio,          1, "", true)}
      ${cell(p.ev_ebitda,         tf.ev_ebitda,         1, "", true)}
      ${cell(p.ps_ratio,          tf.ps_ratio,          1, "", true)}
      ${cell(p.gross_margin,      tf.gross_margin,      1, "%")}
      ${cell(p.operating_margin,  tf.operating_margin,  1, "%")}
      ${cell(p.roic,              tf.roic,              1, "%")}
      ${growthCell(p.revenue_growth_yoy, tf.revenue_growth_yoy)}
      ${growthCell(p.eps_growth_yoy,     tf.eps_growth_yoy)}
      ${cell(p.net_debt_ebitda,   tf.net_debt_ebitda,   1, "x", true)}
      ${cell(p.fcf_yield,         tf.fcf_yield,         1, "%")}
    </tr>`;
}

function animateRings() {
  requestAnimationFrame(() => {
    document.querySelectorAll(".ring-fill").forEach(el => {
      const score = parseInt(el.dataset.score) || 0;
      const circ = 2 * Math.PI * 36;
      const offset = circ * (1 - score / 100);
      setTimeout(() => { el.style.strokeDashoffset = offset; }, 100);
    });
  });
}
</script>

<script>
// ── Invite code gate ───────────────────────────────────────
(function() {
  const saved = localStorage.getItem("inviteCode");
  if (saved) {
    // Silently verify saved code is still valid
    fetch("/api/verify-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code: saved }),
    })
    .then(r => r.json())
    .then(d => { if (!d.valid) { localStorage.removeItem("inviteCode"); showGate(); } else { hideGate(); } })
    .catch(() => hideGate()); // network error — let them through, API will reject if invalid
  } else {
    showGate();
  }
})();

function showGate() { document.getElementById("gate").classList.remove("hidden"); }
function hideGate() { document.getElementById("gate").classList.add("hidden"); }

async function submitCode() {
  const input = document.getElementById("gateInput");
  const errorEl = document.getElementById("gateError");
  const code = input.value.trim().toUpperCase();
  errorEl.textContent = "";
  if (!code) { errorEl.textContent = "Please enter your invite code."; return; }
  try {
    const res = await fetch("/api/verify-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (data.valid) {
      localStorage.setItem("inviteCode", code);
      hideGate();
    } else {
      errorEl.textContent = "Invalid code. Request access via the invite link.";
      input.value = "";
      input.focus();
    }
  } catch {
    errorEl.textContent = "Could not verify code. Please try again.";
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && !document.getElementById("gate").classList.contains("hidden")) {
    submitCode();
  }
});
</script>

<script>
(function() {
  const tip = document.getElementById("fund-tooltip");
  document.addEventListener("mouseover", function(e) {
    const el = e.target.closest("[data-tip]");
    if (!el) return;
    tip.textContent = el.getAttribute("data-tip");
    tip.classList.add("visible");
  });
  document.addEventListener("mousemove", function(e) {
    if (!tip.classList.contains("visible")) return;
    const pad = 12, tw = 220, th = tip.offsetHeight;
    let x = e.clientX + pad;
    let y = e.clientY - th - pad;
    if (x + tw > window.innerWidth) x = e.clientX - tw - pad;
    if (y < 0) y = e.clientY + pad;
    tip.style.left = x + "px";
    tip.style.top  = y + "px";
  });
  document.addEventListener("mouseout", function(e) {
    if (!e.target.closest("[data-tip]")) return;
    tip.classList.remove("visible");
  });
})();
</script>
